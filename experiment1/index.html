<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>Hipster Hippy Adventure</title>
  <style>
    * { margin: 0; padding: 0; box-sizing: border-box; }

    body {
      background: #111;
      display: flex;
      flex-direction: column;
      align-items: center;
      justify-content: center;
      height: 100vh;
      overflow: hidden;
      font-family: monospace;
    }

    canvas {
      display: block;
      border: 2px solid #444;
      image-rendering: pixelated;
    }

    #dpad {
      margin-top: 20px;
      display: grid;
      grid-template-areas:
        ". up ."
        "left . right"
        ". down .";
      gap: 6px;
    }

    .btn {
      width: 56px;
      height: 56px;
      background: #1a1a2e;
      border: 2px solid #555;
      color: #aaa;
      font-size: 20px;
      border-radius: 6px;
      cursor: pointer;
      display: flex;
      align-items: center;
      justify-content: center;
      user-select: none;
      -webkit-tap-highlight-color: transparent;
      touch-action: manipulation;
    }

    .btn:active, .btn.pressed {
      background: #4a3080;
      border-color: #9060ff;
      color: #fff;
    }

    #btn-up    { grid-area: up; }
    #btn-left  { grid-area: left; }
    #btn-right { grid-area: right; }
    #btn-down  { grid-area: down; }

    #hint { margin-top: 12px; color: #444; font-size: 12px; }
  </style>
</head>
<body>

  <canvas id="game" width="600" height="400"></canvas>

  <div id="dpad">
    <button class="btn" id="btn-up">▲</button>
    <button class="btn" id="btn-left">◀</button>
    <button class="btn" id="btn-right">▶</button>
    <button class="btn" id="btn-down">▼</button>
  </div>

  <div id="hint">WASD or d-pad to move</div>

  <script>
    const canvas = document.getElementById('game');
    const ctx = canvas.getContext('2d');

    // ── Sprite sheet config ──────────────────────────────────────────────────
    // Sprite sheet: 8 columns, 6 rows
    // Row 0 → walk down   (frames 0-3)
    // Row 1 → walk right  (frames 0-3, flipped for left)
    // Row 2 → walk up     (frames 0-3)
    const SHEET = {
      cols: 8,
      rows: 6,
      walkFrames: 4,   // frames used per walk cycle
      fps: 8,          // animation frames per second
      scale: 0.5,      // scale sprite down to fit the SNES aesthetic
    };

    // Direction → { row, flipX }
    // Row 1 faces RIGHT, so flip it for LEFT
    const DIR = {
      down:  { row: 0, flip: false },
      left:  { row: 1, flip: true  },
      right: { row: 1, flip: false },
      up:    { row: 2, flip: false },
    };

    // ── Game state ───────────────────────────────────────────────────────────
    const SPEED = 3;
    let x = canvas.width  / 2;
    let y = canvas.height / 2;
    let facing  = 'down';
    let moving  = false;
    let frame   = 0;
    let lastFrameTime = 0;

    const keys = { w: false, a: false, s: false, d: false };

    // ── Sprite image ─────────────────────────────────────────────────────────
    const sheet = new Image();
    sheet.src = 'IMG_0423.png';

    let frameW = 0;
    let frameH = 0;
    let spriteW = 0;
    let spriteH = 0;
    let processedSheet = null;

    // Remove the checkered grey transparency background baked into the PNG
    function removeCheckerboard(img) {
      const oc = document.createElement('canvas');
      oc.width  = img.width;
      oc.height = img.height;
      const ox = oc.getContext('2d');
      ox.drawImage(img, 0, 0);
      const id = ox.getImageData(0, 0, oc.width, oc.height);
      const px = id.data;
      const TOL = 28;
      for (let i = 0; i < px.length; i += 4) {
        const r = px[i], g = px[i+1], b = px[i+2];
        // Neutral grey pixels (R≈G≈B) in the 120-215 range = checkerboard
        const isNeutral = Math.abs(r-g) < TOL && Math.abs(g-b) < TOL && Math.abs(r-b) < TOL;
        if (isNeutral && r > 120 && r < 215) px[i+3] = 0;
      }
      ox.putImageData(id, 0, 0);
      return oc;
    }

    sheet.onload = () => {
      frameW        = sheet.width  / SHEET.cols;
      frameH        = sheet.height / SHEET.rows;
      spriteW       = frameW  * SHEET.scale;
      spriteH       = frameH  * SHEET.scale;
      processedSheet = removeCheckerboard(sheet);
      loop(0);
    };

    sheet.onerror = () => {
      // Fallback: draw orange dot if sprite not found
      spriteW = 24;
      spriteH = 24;
      loop(0);
    };

    // ── Background (simple grassy SNES look) ─────────────────────────────────
    function drawBg() {
      ctx.fillStyle = '#3a6b35';
      ctx.fillRect(0, 0, canvas.width, canvas.height);

      // subtle tile grid
      ctx.strokeStyle = 'rgba(0,0,0,0.1)';
      ctx.lineWidth = 1;
      const tile = 32;
      for (let tx = 0; tx < canvas.width;  tx += tile) ctx.strokeRect(tx, 0, tile, canvas.height);
      for (let ty = 0; ty < canvas.height; ty += tile) ctx.strokeRect(0, ty, canvas.width, tile);
    }

    // ── Draw sprite or fallback dot ───────────────────────────────────────────
    function drawSprite() {
      if (!frameW || !processedSheet) {
        // fallback dot
        ctx.fillStyle = '#f90';
        ctx.shadowColor = '#f90';
        ctx.shadowBlur = 12;
        ctx.beginPath();
        ctx.arc(x, y, 10, 0, Math.PI * 2);
        ctx.fill();
        ctx.shadowBlur = 0;
        return;
      }

      const dir = DIR[facing];
      const srcX = frame * frameW;
      const srcY = dir.row * frameH;

      ctx.save();

      if (dir.flip) {
        ctx.translate(x, y);
        ctx.scale(-1, 1);
        ctx.drawImage(
          processedSheet,
          srcX, srcY, frameW, frameH,
          -spriteW / 2, -spriteH / 2, spriteW, spriteH
        );
      } else {
        ctx.drawImage(
          processedSheet,
          srcX, srcY, frameW, frameH,
          x - spriteW / 2, y - spriteH / 2, spriteW, spriteH
        );
      }

      ctx.restore();
    }

    // ── Main loop ─────────────────────────────────────────────────────────────
    function loop(ts) {
      // Movement
      const W = canvas.width;
      const H = canvas.height;
      const hw = (spriteW || 12) / 2;
      const hh = (spriteH || 12) / 2;

      moving = false;
      if (keys.w) { y -= SPEED; facing = 'up';    moving = true; }
      if (keys.s) { y += SPEED; facing = 'down';  moving = true; }
      if (keys.a) { x -= SPEED; facing = 'left';  moving = true; }
      if (keys.d) { x += SPEED; facing = 'right'; moving = true; }

      x = Math.max(hw, Math.min(W - hw, x));
      y = Math.max(hh, Math.min(H - hh, y));

      // Advance animation frame
      const frameDuration = 1000 / SHEET.fps;
      if (moving && ts - lastFrameTime > frameDuration) {
        frame = (frame + 1) % SHEET.walkFrames;
        lastFrameTime = ts;
      }
      if (!moving) frame = 0;

      // Draw
      drawBg();
      drawSprite();

      requestAnimationFrame(loop);
    }

    // ── Input: keyboard ───────────────────────────────────────────────────────
    document.addEventListener('keydown', e => {
      const k = e.key.toLowerCase();
      if (k in keys) { keys[k] = true; e.preventDefault(); }
    });
    document.addEventListener('keyup', e => {
      const k = e.key.toLowerCase();
      if (k in keys) keys[k] = false;
    });

    // ── Input: d-pad ──────────────────────────────────────────────────────────
    const btnMap = {
      'btn-up':    'w',
      'btn-left':  'a',
      'btn-right': 'd',
      'btn-down':  's',
    };

    Object.entries(btnMap).forEach(([id, key]) => {
      const btn = document.getElementById(id);
      const press   = () => { keys[key] = true;  btn.classList.add('pressed'); };
      const release = () => { keys[key] = false; btn.classList.remove('pressed'); };

      btn.addEventListener('mousedown',  press);
      btn.addEventListener('mouseup',    release);
      btn.addEventListener('mouseleave', release);
      btn.addEventListener('touchstart', e => { e.preventDefault(); press(); },   { passive: false });
      btn.addEventListener('touchend',   e => { e.preventDefault(); release(); }, { passive: false });
    });
  </script>
</body>
</html>
